<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Página não encontrada</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230d0d10'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23e8852b'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0d0d10;color:#f2f0ec;min-height:100svh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  font-family:'Space Grotesk',system-ui,sans-serif;text-align:center;padding:24px;
}
.code{font-family:'JetBrains Mono',monospace;font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;color:#e8852b}
h1{font-size:clamp(3rem,14vw,7rem);font-weight:600;letter-spacing:-.04em;line-height:.9}
p{color:#9a99a3;max-width:38ch}
a{
  margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:.82rem;color:#f2f0ec;
  border:1px solid #26262e;padding:11px 20px;border-radius:3px;text-decoration:none;transition:border-color .2s,background .2s;
}
a:hover{border-color:#e8852b;background:#15151a}
</style>
</head>
<body>
  <span class="code">Error · 404</span>
  <h1>Frame perdido.</h1>
  <p>Esta página não existe ou foi movida. Volta ao início para ver o trabalho.</p>
  <a href="/portfolio/">← Voltar ao portfolio</a>
</body>
